name: WonderTravel CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'
      - run: npm ci
      - run: npm test

  build-client:
    needs: test-server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'
          
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  deploy-server:
    needs: test-server
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Render deploy hook not configured, skipping."
          else
            curl -X POST "$RENDER_DEPLOY_HOOK"
          fi
