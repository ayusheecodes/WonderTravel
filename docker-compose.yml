services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/wondertravel
      - JWT_SECRET=wondertravel_secret_dev
      - CORS_ORIGIN=http://localhost,http://localhost:80,http://127.0.0.1
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:5000/health', res => { process.exit(res.statusCode===200?0:1) }).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - wondertravel-net

  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - server
    healthcheck:
      test: ["CMD-SHELL", "[ -f /usr/share/nginx/html/index.html ] || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - wondertravel-net

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - wondertravel-net

networks:
  wondertravel-net:
    driver: bridge

volumes:
  mongo-data:
